name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── 1. Серверные тесты + покрытие ──────────────────────────────────────────
  server-tests:
    name: Server tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Check syntax
        working-directory: server
        run: node --check index.js

      - name: Run tests with coverage
        working-directory: server
        run: npm test -- --coverage

      - name: Upload coverage report
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/lcov.info
          retention-days: 7

  # ── 2. ESLint клиент ────────────────────────────────────────────────────────
  client-lint:
    name: ESLint (client)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install client dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint (0 errors, max 50 warnings)
        run: npm run lint -- --max-warnings 50

  # ── 3. Аудит безопасности — сервер ─────────────────────────────────────────
  server-audit:
    name: Security audit (server)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: npm audit (server)
        working-directory: server
        run: npm audit --audit-level=high

  # ── 4. Аудит безопасности — клиент ─────────────────────────────────────────
  client-audit:
    name: Security audit (client)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install client dependencies
        run: npm install --legacy-peer-deps
        continue-on-error: true

      - name: npm audit (client)
        run: npm audit --audit-level=high
        # RN peer-dep vulnerabilities часто вне нашего контроля
        continue-on-error: true
